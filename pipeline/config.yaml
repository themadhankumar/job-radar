  # ---- Candidates to probe when expanding coverage ----
  # Run:  python discover.py "Anthropic" "OpenAI" "Cohere" "Handshake" \
  #         "Appen" "iMerit" "Sama" "Toloka" "Prolific" "Micro1" \
  #         "Pareto" "Ambience Healthcare" "Suki" "Nabla" "Datavant" \
  #         "Truveta" "Komodo Health" "Flatiron Health" "Verily"
  # …then paste the verified YAML here.

# Companies on custom/unsupported ATS — no public board to poll — are
# covered by the LinkedIn searches below: Optum/UHG (Radancy portal;
# also check the internal mobility site as an employee), Duke Health
# (Phenom), Epic, Mayo Clinic, UMN, Stanford Health Care, Microsoft,
# Oracle Health.
linkedin:
  enabled: true
  location: "United States"
  pages_per_search: 3            # 25 results per page
  remote_only: false             # true adds f_WT=2 (remote filter)
  searches:
    - "AI data product manager"
    - "data annotation product manager"
    - "technical program manager AI healthcare"
    - "ML data operations manager"
    - "human in the loop product"
    - "Epic Systems product manager"
    - "Mayo Clinic AI program manager"
    - "Stanford Health Care data product"
    - "Duke Health AI data"
    - "Optum data product manager"
    - "Microsoft AI data product manager"
    - "Oracle Health product manager"
    - "University of Minnesota AI program"

notion:
  enabled: true                  # needs NOTION_TOKEN + NOTION_DATABASE_ID in env/.env

state_db: state/seen_jobs.db
